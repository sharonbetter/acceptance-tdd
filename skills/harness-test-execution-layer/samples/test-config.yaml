# 测试执行配置
# 用于 Harness CI/CD 测试执行抽象层

project_name: example-web-app
project_type: web
target_tool: playwright

# Harness 集成配置
harness:
  delegate_profile: k8s-delegate
  timeout_minutes: 30
  retry_count: 1

# 报告配置
report:
  format: junit
  path: reports/junit.xml
  always_include_output: true

# 工具配置
tools:
  playwright:
    config: playwright.config.ts
    browser: chromium
    headless: true
    viewport:
      width: 1280
      height: 720
    timeout: 30000

  appium:
    platform: android
    app_package: com.example.app
    app_activity: .MainActivity
    automation_name: UiAutomator2

  pytest:
    markers:
      - smoke
      - regression
      - e2e
    asyncio_mode: auto
    log_cli: true
    log_cli_level: INFO

# 测试套件路径
test_suites:
  e2e: tests/e2e/**/*.feature
  api: tests/api/**/*.py
  mobile: tests/mobile/**/*.feature

# 环境变量（运行时注入）
env:
  BASE_URL: https://staging.example.com
  API_BASE_URL: https://api.staging.example.com
  DB_HOST: db.staging.example.com
